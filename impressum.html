<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Impressum</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #fff;
    color: #000;
    font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 12vh 24px 20vh;
  }
  h1 {
    font-weight: 900;
    font-size: clamp(1.8rem, 6vw, 3rem);
    letter-spacing: -0.02em;
    text-transform: uppercase;
    line-height: 0.95;
    margin: 0 0 2.5rem;
  }
  h2 {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin: 2.5rem 0 0.5rem;
  }
  p {
    font-size: 0.95rem;
    line-height: 1.55;
    margin: 0;
  }
  a { color: #000; }

  /* Adressblock mit höhenbündigem Video rechts */
  .address-row {
    position: relative;
  }
  .address-row video {
    position: absolute;
    top: 0;
    right: 0;
    height: 100%;
    width: auto;
    display: block;
  }
  @media (max-width: 480px) {
    /* auf sehr schmalen Screens rutscht das Video unter die Adresse */
    .address-row video {
      position: static;
      height: auto;
      width: 100%;
      max-width: 280px;
      margin-top: 1rem;
    }
  }
  .back {
    display: inline-block;
    margin-top: 4rem;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #000;
    opacity: 0.55;
    text-decoration: none;
    transition: opacity 0.2s ease;
  }
  .back:hover, .back:focus-visible { opacity: 1; outline: none; }
</style>
</head>
<body>
<main>
  <h1>Impressum</h1>

  <h2>Angaben gemäß § 5 DDG</h2>
  <div class="address-row">
    <p>
      Max Kopp<br>
      c/o We Own You Agency<br>
      Otto-Fischer-Str. 5–7<br>
      50670 Köln
    </p>
    <video autoplay muted loop playsinline aria-hidden="true">
      <source src="assets/krokodil.webm" type="video/webm">
      <source src="assets/krokodil.mp4" type="video/mp4">
    </video>
  </div>

  <h2>Kontakt</h2>
  <p>
    E-Mail: <a href="mailto:info@maxberndotto.de">info@maxberndotto.de</a>
  </p>

  <h2>Verantwortlich für den Inhalt</h2>
  <p>
    Max Kopp, Anschrift wie oben
  </p>

  <a class="back" href="index.html">Zurück</a>
</main>
</body>
</html>
